name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run API tests
        env:
          TEST_ENV: dev
        run: npm run test:api

      - name: Upload API Allure results
        uses: actions/upload-artifact@v4
        with:
          name: allure-api
          path: allure-results
          if-no-files-found: error

  ui-tests:
    runs-on: ubuntu-latest
    needs: api-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run UI tests
        env:
          TEST_ENV: dev
        run: npm run test:ui

      - name: Upload UI Allure results
        uses: actions/upload-artifact@v4
        with:
          name: allure-ui
          path: allure-results
          if-no-files-found: error

  performance-tests:
    runs-on: ubuntu-latest
    needs: ui-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Performance tests
        env:
          TEST_ENV: dev
        run: npm run test:perf

      - name: Upload Performance Allure results
        uses: actions/upload-artifact@v4
        with:
          name: allure-perf
          path: allure-results
          if-no-files-found: error

  allure-report:
    runs-on: ubuntu-latest
    needs: [api-tests, ui-tests, performance-tests]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download API Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-api
          path: merged-results/api

      - name: Download UI Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-ui
          path: merged-results/ui

      - name: Download Performance Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-perf
          path: merged-results/perf

      - name: Merge Allure result files
        run: |
          mkdir -p allure-results
          cp -r merged-results/api/* allure-results/ || true
          cp -r merged-results/ui/* allure-results/ || true
          cp -r merged-results/perf/* allure-results/ || true

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Generate Allure report
        run: allure generate allure-results --clean -o allure-report

      - name: Upload final Allure report artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-allure-report
          path: allure-report
          if-no-files-found: error

      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages