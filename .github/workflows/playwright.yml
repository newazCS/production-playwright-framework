name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

  TEST_ENV: dev
  ENV: ${{ secrets.ENV }}

  SAUCEDEMO_UI_BASE_URL: ${{ secrets.SAUCEDEMO_UI_BASE_URL }}
  SAUCEDEMO_UI_USERNAME: ${{ secrets.SAUCEDEMO_UI_USERNAME }}
  SAUCEDEMO_UI_PASSWORD: ${{ secrets.SAUCEDEMO_UI_PASSWORD }}
  SAUCEDEMO_PERF_THRESHOLD: ${{ secrets.SAUCEDEMO_PERF_THRESHOLD }}

  AUTOMATIONEXERCISE_UI_BASE_URL: ${{ secrets.AUTOMATIONEXERCISE_UI_BASE_URL }}
  AUTOMATIONEXERCISE_PERF_THRESHOLD: ${{ secrets.AUTOMATIONEXERCISE_PERF_THRESHOLD }}

  JSONPLACEHOLDER_API_BASE_URL: ${{ secrets.JSONPLACEHOLDER_API_BASE_URL }}

  REQRES_API_BASE_URL: ${{ secrets.REQRES_API_BASE_URL }}
  REQRES_API_EMAIL: ${{ secrets.REQRES_API_EMAIL }}
  REQRES_API_PASSWORD: ${{ secrets.REQRES_API_PASSWORD }}
  REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}

jobs:
  api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Debug API env presence
        run: |
          [ -n "$JSONPLACEHOLDER_API_BASE_URL" ] && echo "JSONPLACEHOLDER_API_BASE_URL is set" || echo "JSONPLACEHOLDER_API_BASE_URL is MISSING"
          [ -n "$REQRES_API_BASE_URL" ] && echo "REQRES_API_BASE_URL is set" || echo "REQRES_API_BASE_URL is MISSING"
          [ -n "$REQRES_API_EMAIL" ] && echo "REQRES_API_EMAIL is set" || echo "REQRES_API_EMAIL is MISSING"
          [ -n "$REQRES_API_PASSWORD" ] && echo "REQRES_API_PASSWORD is set" || echo "REQRES_API_PASSWORD is MISSING"
          [ -n "$REQRES_API_KEY" ] && echo "REQRES_API_KEY is set" || echo "REQRES_API_KEY is MISSING"

      - name: Run API tests
        run: npm run test:api

      - name: Upload API Allure results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-api
          path: allure-results
          if-no-files-found: warn

  ui-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Debug UI env presence
        run: |
          [ -n "$SAUCEDEMO_UI_BASE_URL" ] && echo "SAUCEDEMO_UI_BASE_URL is set" || echo "SAUCEDEMO_UI_BASE_URL is MISSING"
          [ -n "$SAUCEDEMO_UI_USERNAME" ] && echo "SAUCEDEMO_UI_USERNAME is set" || echo "SAUCEDEMO_UI_USERNAME is MISSING"
          [ -n "$SAUCEDEMO_UI_PASSWORD" ] && echo "SAUCEDEMO_UI_PASSWORD is set" || echo "SAUCEDEMO_UI_PASSWORD is MISSING"
          [ -n "$AUTOMATIONEXERCISE_UI_BASE_URL" ] && echo "AUTOMATIONEXERCISE_UI_BASE_URL is set" || echo "AUTOMATIONEXERCISE_UI_BASE_URL is MISSING"

      - name: Run UI tests
        run: npm run test:ui

      - name: Upload UI Allure results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-ui
          path: allure-results
          if-no-files-found: warn

  performance-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Debug Performance env presence
        run: |
          [ -n "$SAUCEDEMO_PERF_THRESHOLD" ] && echo "SAUCEDEMO_PERF_THRESHOLD is set" || echo "SAUCEDEMO_PERF_THRESHOLD is MISSING"
          [ -n "$AUTOMATIONEXERCISE_PERF_THRESHOLD" ] && echo "AUTOMATIONEXERCISE_PERF_THRESHOLD is set" || echo "AUTOMATIONEXERCISE_PERF_THRESHOLD is MISSING"

      - name: Run Performance tests
        run: npm run test:perf

      - name: Upload Performance Allure results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-perf
          path: allure-results
          if-no-files-found: warn

  allure-report:
    runs-on: ubuntu-latest
    needs: [api-tests, ui-tests, performance-tests]
    if: always()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download API Allure results
        uses: actions/download-artifact@v8
        with:
          name: allure-api
          path: merged-results/api
        continue-on-error: true

      - name: Download UI Allure results
        uses: actions/download-artifact@v8
        with:
          name: allure-ui
          path: merged-results/ui
        continue-on-error: true

      - name: Download Performance Allure results
        uses: actions/download-artifact@v8
        with:
          name: allure-perf
          path: merged-results/perf
        continue-on-error: true

      - name: Merge Allure result files
        run: |
          mkdir -p allure-results
          cp -r merged-results/api/* allure-results/ 2>/dev/null || true
          cp -r merged-results/ui/* allure-results/ 2>/dev/null || true
          cp -r merged-results/perf/* allure-results/ 2>/dev/null || true
          ls -la allure-results || true

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Generate Allure report
        run: allure generate allure-results --clean -o allure-report

      - name: Upload final Allure report artifact
        uses: actions/upload-artifact@v6
        with:
          name: final-allure-report
          path: allure-report
          if-no-files-found: error

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages-${{ github.run_attempt }}
          path: ./allure-report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-${{ github.run_attempt }}