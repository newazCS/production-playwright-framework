name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

env:
  TEST_ENV: dev
  ENV: dev

  SAUCEDEMO_UI_BASE_URL: https://www.saucedemo.com
  SAUCEDEMO_UI_USERNAME: standard_user
  SAUCEDEMO_UI_PASSWORD: secret_sauce
  SAUCEDEMO_PERF_THRESHOLD: "3000"

  AUTOMATIONEXERCISE_UI_BASE_URL: https://automationexercise.com
  AUTOMATIONEXERCISE_PERF_THRESHOLD: "5000"

  JSONPLACEHOLDER_API_BASE_URL: https://jsonplaceholder.typicode.com
  REQRES_API_BASE_URL: https://reqres.in/api

jobs:
  api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Debug API env
        run: |
          echo "JSONPLACEHOLDER_API_BASE_URL=$JSONPLACEHOLDER_API_BASE_URL"
          echo "REQRES_API_BASE_URL=$REQRES_API_BASE_URL"

      - name: Run API tests
        run: npm run test:api

      - name: Upload API Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-api
          path: allure-results
          if-no-files-found: warn

  ui-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Debug UI env
        run: |
          echo "SAUCEDEMO_UI_BASE_URL=$SAUCEDEMO_UI_BASE_URL"
          echo "AUTOMATIONEXERCISE_UI_BASE_URL=$AUTOMATIONEXERCISE_UI_BASE_URL"

      - name: Run UI tests
        run: npm run test:ui

      - name: Upload UI Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-ui
          path: allure-results
          if-no-files-found: warn

  performance-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Debug Performance env
        run: |
          echo "SAUCEDEMO_PERF_THRESHOLD=$SAUCEDEMO_PERF_THRESHOLD"
          echo "AUTOMATIONEXERCISE_PERF_THRESHOLD=$AUTOMATIONEXERCISE_PERF_THRESHOLD"

      - name: Run Performance tests
        run: npm run test:perf

      - name: Upload Performance Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-perf
          path: allure-results
          if-no-files-found: warn

  allure-report:
    runs-on: ubuntu-latest
    needs: [api-tests, ui-tests, performance-tests]
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download API Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-api
          path: merged-results/api
        continue-on-error: true

      - name: Download UI Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-ui
          path: merged-results/ui
        continue-on-error: true

      - name: Download Performance Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-perf
          path: merged-results/perf
        continue-on-error: true

      - name: Merge Allure result files
        run: |
          mkdir -p allure-results
          cp -r merged-results/api/* allure-results/ 2>/dev/null || true
          cp -r merged-results/ui/* allure-results/ 2>/dev/null || true
          cp -r merged-results/perf/* allure-results/ 2>/dev/null || true
          ls -la allure-results || true

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Generate Allure report
        run: allure generate allure-results --clean -o allure-report

      - name: Upload final Allure report artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-allure-report
          path: allure-report
          if-no-files-found: error

      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages